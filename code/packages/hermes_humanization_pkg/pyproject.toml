[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-humanization"
version = "0.2.0"
description = "AI拟人化核心系统 - 情绪、欲望、知识图谱记忆"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
]

[tool.setuptools.packages.find]
where = ["src"]
